# API documentation (doc-gen4) + blueprint, built and deployed to GitHub Pages.
#
# Adapted from lean-gallery's drop-in docs.yml (see the KB docgen4-docbuild note).
# Two artifacts on one Pages site, matching blueprint/src/web.tex's \dochome:
#   /docs      doc-gen4 API docs, trimmed to GoodsteinPA (deps link out to hosted
#              mathlib4_docs + Foundation docs) — the target of the dep graph's
#              "Lean" links
#   /blueprint leanblueprint web output, with ledger lap/confidence estimates
#              injected by blueprint/annotate_depgraph.py
#
# Deliberately a SEPARATE, non-required workflow from the build/test CI (which stays
# the merge gate). A docs break is an honest red X that never blocks a merge.
#
# Build cadence — docs build ONLY off the default branch, release/rc tags, or
# on-demand; never on an arbitrary PR:
#   • push to plan/main/master → build + deploy to Pages (the source of truth)
#   • v* tag (incl. -rcN)      → build only; rc tags mirror the Lean toolchain, i.e.
#                                exactly when doc-gen4 tends to break across a bump
#   • PR touching a build-
#     sensitive file           → build only (toolchain / lakefile / manifest /
#                                docbuild / blueprint are the breakers)
#   • on-demand PR             → add the `force-docs` label, or push a `*-force-docs`
#                                branch
#   • ordinary PR              → builds NOTHING (0 doc-CI minutes)
name: docs

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

# Serialize Pages deploys so concurrent runs can't hit the "in progress deployment" race.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: write       # peaceiris pushes the built site to the gh-pages branch
  pull-requests: read   # paths-filter reads the PR's changed-file list

jobs:
  # Cheap (~seconds) gate: did this change touch a docs-breaking file?
  #
  # VISIBILITY GUARD: the `if:` below builds + deploys while the repo is public
  # (Pages is live) and auto-skips everything if it's ever made private again —
  # no Pages on the free plan means a deploy would serve nothing, and private
  # Actions minutes are capped (build locally via docbuild/build-site.py in that
  # case). `workflow_dispatch` forces a manual run in either state.
  changes:
    if: github.event.repository.private == false || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    outputs:
      sensitive: ${{ steps.filter.outputs.sensitive }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            sensitive:
              - 'lean-toolchain'
              - 'lakefile.*'
              - 'lake-manifest.json'
              - 'docbuild/**'
              - 'blueprint/**'

  docs:
    needs: changes
    if: >
      github.event_name == 'push'
      || github.event_name == 'workflow_dispatch'
      || needs.changes.outputs.sensitive == 'true'
      || contains(github.event.pull_request.labels.*.name, 'force-docs')
      || endsWith(github.head_ref, '-force-docs')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      # elan only; we drive the build ourselves inside docbuild/ (the parent lib is
      # compiled as a dependency of the `:docs` facet: cached Mathlib oleans via
      # `lake exe cache get`, Foundation rebuilt from source like the main CI).
      - uses: leanprover/lean-action@v1
        with:
          build: false
      # Same driver as a local build (docbuild/build-site.py): doc-gen4 build,
      # trim (keep GoodsteinPA; deps link out to hosted mathlib4_docs / Foundation
      # docs), blueprint with ledger estimates, assemble site/ (/docs + /blueprint).
      # --ci additionally pulls the Mathlib olean cache first.
      # doc-gen4's peak sits right at the runner's 16 GB. lean-gallery OOM'd here
      # deterministically on ubuntu-26.04 (a preview image) and was green on the byte-identical
      # build under 24.04, whose swap absorbs the peak; tao-collatz renders green on the same
      # 24.04 + explicit-swap config. goodstein had never been tried on it — the earlier "swap
      # doesn't carry the peak" result was measured on 26.04, so it was confounded by the image.
      # Provide our own headroom rather than inheriting the image's, and log the water line.
      - name: Add 8 GB swap (doc-gen4 headroom)
        run: |
          SWAP=/mnt/swapfile-docs
          sudo fallocate -l 8G "$SWAP" 2>/dev/null || { SWAP=/swapfile-docs; sudo fallocate -l 8G "$SWAP"; }
          sudo chmod 600 "$SWAP"
          sudo mkswap "$SWAP"
          sudo swapon "$SWAP"
          swapon --show
          free -h

      - name: Build site (docs + blueprint)
        run: |
          pip install leanblueprint
          python3 docbuild/build-site.py --ci
      # While the repo is private (no Pages on the free plan), the built site is
      # still inspectable: download this artifact and serve it locally.
      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: site
      - name: Deploy to GitHub Pages
        if: github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site
          # doc-gen4 is best-effort (OOMs the runner); when build-site.py ships the
          # blueprint WITHOUT a fresh site/docs, keep_files preserves the last-good
          # /docs already on gh-pages so the blueprint's Lean links still resolve.
          keep_files: true
