# API documentation (doc-gen4) + blueprint, built and deployed to GitHub Pages.
#
# Adapted from lean-gallery's drop-in docs.yml (see the KB docgen4-docbuild note).
# Two artifacts on one Pages site, matching blueprint/src/web.tex's \dochome:
#   /docs      doc-gen4 API docs, trimmed to GoodsteinPA (deps link out to hosted
#              mathlib4_docs + Foundation docs) — the target of the dep graph's
#              "Lean" links
#   /blueprint leanblueprint web output, with ledger lap/confidence estimates
#              injected by blueprint/annotate_depgraph.py
#
# Deliberately a SEPARATE, non-required workflow from the build/test CI (which stays
# the merge gate). A docs break is an honest red X that never blocks a merge.
#
# Build cadence — docs build ONLY off the default branch, release/rc tags, or
# on-demand; never on an arbitrary PR:
#   • push to plan/main/master → build + deploy to Pages (the source of truth)
#   • v* tag (incl. -rcN)      → build only; rc tags mirror the Lean toolchain, i.e.
#                                exactly when doc-gen4 tends to break across a bump
#   • PR touching a build-
#     sensitive file           → build only (toolchain / lakefile / manifest /
#                                docbuild / blueprint are the breakers)
#   • on-demand PR             → add the `force-docs` label, or push a `*-force-docs`
#                                branch
#   • ordinary PR              → builds NOTHING (0 doc-CI minutes)
name: docs

on:
  push:
    branches: [plan, main, master]
    tags: ['v*']
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

# Serialize Pages deploys so concurrent runs can't hit the "in progress deployment" race.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: write       # peaceiris pushes the built site to the gh-pages branch
  pull-requests: read   # paths-filter reads the PR's changed-file list

jobs:
  # Cheap (~seconds) gate: did this change touch a docs-breaking file?
  changes:
    runs-on: ubuntu-latest
    outputs:
      sensitive: ${{ steps.filter.outputs.sensitive }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            sensitive:
              - 'lean-toolchain'
              - 'lakefile.*'
              - 'lake-manifest.json'
              - 'docbuild/**'
              - 'blueprint/**'

  docs:
    needs: changes
    if: >
      github.event_name == 'push'
      || github.event_name == 'workflow_dispatch'
      || needs.changes.outputs.sensitive == 'true'
      || contains(github.event.pull_request.labels.*.name, 'force-docs')
      || endsWith(github.head_ref, '-force-docs')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # elan only; we drive the build ourselves inside docbuild/ (the parent lib is
      # compiled as a dependency of the `:docs` facet: cached Mathlib oleans via
      # `lake exe cache get`, Foundation rebuilt from source like the main CI).
      - uses: leanprover/lean-action@v1
        with:
          build: false
      - name: Build API docs (docbuild sub-project)
        run: |
          cd docbuild
          lake exe cache get || true
          lake build GoodsteinPA:docs
      # doc-gen4 renders the WHOLE import closure (Mathlib + Foundation, ~GBs). Keep
      # only GoodsteinPA's pages; deps link out to hosted mathlib4_docs / Foundation
      # docs. See docbuild/trim-docs.py for the why.
      - name: Trim docs (link deps to hosted mathlib4_docs / Foundation docs)
        run: python3 docbuild/trim-docs.py docbuild/.lake/build/doc GoodsteinPA
      - name: Build blueprint (with ledger estimates)
        run: |
          pip install leanblueprint
          python3 blueprint/annotate_depgraph.py --web
      - name: Assemble site (/docs + /blueprint)
        run: |
          mkdir -p site
          cp -R docbuild/.lake/build/doc site/docs
          cp -R blueprint/web site/blueprint
          cat > site/index.html << 'HTML'
          <!DOCTYPE html>
          <meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=blueprint/dep_graph_document.html">
          <title>goodstein-independence</title>
          <p><a href="blueprint/dep_graph_document.html">Blueprint dependency graph</a> ·
             <a href="blueprint/index.html">Blueprint</a> ·
             <a href="docs/">API docs</a></p>
          HTML
      # While the repo is private (no Pages on the free plan), the built site is
      # still inspectable: download this artifact and serve it locally.
      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: site
      - name: Deploy to GitHub Pages
        if: github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site
