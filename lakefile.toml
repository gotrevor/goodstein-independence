# GoodsteinPA — Track 2 of the Goodstein effort: the syntactic `𝗣𝗔 ⊬ γ` (Kirby–Paris).
# Built on the `Foundation` monorepo (FormalizedFormalLogic), which supplies first-order logic,
# PA (`𝗣𝗔 = Peano : ArithmeticTheory`), Σ₁ arithmetization, and Gödel II. Track 1 (the
# mathlib-only growth theory) lives in ~/src/lean-formalizations.
#
# Foundation is required by PATH (local sibling clone ~/src/Foundation), pinned at mathlib
# v4.31.0 (the lean-universe base). Path > git URL here because:
#   • it points at our LOCAL v4.31 Foundation, not upstream's stale v4.29.0;
#   • it's offline-buildable — the lean-yolo box bind-mounts all of ~/src, so it sees the
#     prebuilt Foundation .lake and never needs to lake-fetch;
#   • it reuses Foundation's built oleans instead of rebuilding 1665 jobs.
# (Scaffold un-vendored from the Foundation clone 2026-06-19; switch to a git/tag require only
#  if this ever becomes a standalone published repo.)
name = "GoodsteinPA"
defaultTargets = ["GoodsteinPA"]
srcDir = "src"

[[require]]
name = "Foundation"
path = "../Foundation"

[[lean_lib]]
name = "GoodsteinPA"
