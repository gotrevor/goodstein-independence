# GoodsteinPA — Track 2 of the Goodstein effort: the syntactic `𝗣𝗔 ⊬ γ` (Kirby–Paris).
# Built on the `Foundation` monorepo (FormalizedFormalLogic), which supplies first-order logic,
# PA (`𝗣𝗔 = Peano : ArithmeticTheory`), Σ₁ arithmetization, and Gödel II. Track 1 (the
# mathlib-only growth theory) lives in ~/src/lean-formalizations.
#
# Foundation comes from the lean-universe store (4.31.0). It was added as a universe package
# 2026-06-21, so goodstein consumes it via a git require (gotrevor/Foundation, our v4.31 port;
# exact rev pinned in the [[require]] block below, maintained by lake-base link) with the
# store's pre-built oleans CoW-cloned into this repo's
# own .lake/packages by `lake-base link goodstein-independence --require Foundation`. That makes
# goodstein self-contained + offline-buildable (no dependency on the ~/src/Foundation sibling
# clone) and still Replays Foundation's 1671 jobs instead of rebuilding. The [[require]] block
# below is appended/maintained by lake-base link — re-run it after a store re-pin.
name = "GoodsteinPA"
# Build BOTH libs by default: the public root AND the blueprint root. Without the latter in
# defaultTargets, a bare `lake build` (the local .githooks gate + CI's lean-action) never compiles
# the Path B nodes, so `lake exe blueprint_audit` would audit stale/absent oleans (a vacuous gate).
defaultTargets = ["GoodsteinPA", "GoodsteinPABlueprint"]
srcDir = "src"

[[lean_lib]]
name = "GoodsteinPA"

[[lean_lib]]
name = "GoodsteinPABlueprint"

# Machine-verified blueprint status gate. Computes each `@[goodstein_blueprint]` node's real
# `collectAxioms` footprint and reconciles it against the category claim. `supportInterpreter`
# lets `importModules` run imported modules' initializers (registering env extensions) at runtime,
# the same way `checkdecls` does. Run: `lake exe blueprint_audit [trusted-axioms.txt]`.
[[lean_exe]]
name = "blueprint_audit"
root = "BlueprintAudit"
supportInterpreter = true

[[require]]
name = "Foundation"
git = "https://github.com/gotrevor/Foundation.git"
rev = "e6e1ad149d3622b1e670c62092827f84fc276d1c"

[[require]]
name = "checkdecls"
git = "https://github.com/PatrickMassot/checkdecls.git"
rev = "3d425859e73fcfbef85b9638c2a91708ef4a22d4"
